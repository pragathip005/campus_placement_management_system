<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="sidebar(activePage)" class="sidebar">
    <div class="logo">CRMS.</div>

    <ul class="nav">
        <th:block th:if="${activePage != 'Alumni Dashboard'}">
            <li th:class="${activePage == 'Dashboard' ? 'active' : ''}"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li th:class="${activePage == 'Job Board' ? 'active' : ''}"><a th:href="@{/job-board}">Job Board</a></li>
            <li th:class="${activePage == 'Calendar' ? 'active' : ''}"><a th:href="@{/calendar}">Calendar</a></li>
            <li th:class="${activePage == 'Preparation Hub' ? 'active' : ''}"><a th:href="@{/preparation-hub}">Preparation Hub</a></li>
            <li th:class="${activePage == 'Alumni Hub' ? 'active' : ''}"><a th:href="@{/alumni-hub}">Alumni Hub</a></li>
        </th:block>
        <th:block th:if="${activePage == 'Alumni Dashboard'}">
            <li class="active"><a th:href="@{/alumni/portal}">Alumni Dashboard</a></li>
        </th:block>
    </ul>

    <div class="user">
        <div class="user-profile">
            <div class="user-avatar" th:text="${username != null ? #strings.substring(username, 0, 1) : (activePage == 'Alumni Dashboard' ? 'A' : 'U')}">N</div>
            <div class="user-info">
                <h4 th:text="${username != null ? username : (activePage == 'Alumni Dashboard' ? 'Alumni User' : 'User Name')}">User Name</h4>
                <p th:text="${activePage == 'Alumni Dashboard' ? 'Alumni' : 'Student'}">Student</p>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</div>
</body>
</html>
