<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="sidebar(activePage)" class="sidebar">
    <div class="logo">CRMS.</div>

    <ul class="nav">
        <li th:class="${activePage == 'Dashboard' ? 'active' : ''}"><a th:href="@{/dashboard}">Dashboard</a></li>
        <li th:class="${activePage == 'Job Board' ? 'active' : ''}"><a th:href="@{/jobs}">Job Board</a></li>
        <li th:class="${activePage == 'Calendar' ? 'active' : ''}"><a th:href="@{/calendar}">Calendar</a></li>
        <li th:class="${activePage == 'Preparation Hub' ? 'active' : ''}"><a th:href="@{/prep}">Preparation Hub</a></li>
        <li th:class="${activePage == 'Alumni Hub' ? 'active' : ''}"><a th:href="@{/alumni-hub}">Alumni Hub</a></li>
    </ul>

    <div class="user">
        <div class="user-profile">
            <div class="user-avatar" th:text="${username != null ? #strings.substring(username, 0, 1) : 'U'}">N</div>
            <div class="user-info">
                <h4 th:text="${username}">User Name</h4>
                <p>Student</p>
            </div>
        </div>
        <a th:href="@{/logout}">Logout</a>
    </div>
</div>
</body>
</html>
