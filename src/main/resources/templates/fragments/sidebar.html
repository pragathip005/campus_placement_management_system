<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" th:href="@{/css/sidebar.css}">
<body>

<div th:fragment="sidebar(activePage)" class="sidebar">

    <div class="logo">CRMS.</div>

    <ul class="nav">

        <!-- STUDENT NAV -->
        <th:block th:if="${activePage != 'Alumni Dashboard' and activePage != 'HR Dashboard' and activePage != 'HR Applicants' and activePage != 'Admin Dashboard'}">
            <li th:class="${activePage == 'Dashboard' ? 'active' : ''}">
                <a th:href="@{/student/dashboard}">Dashboard</a>
            </li>
            <li th:class="${activePage == 'Job Board' ? 'active' : ''}">
                <a th:href="@{/job-board}">Job Board</a>
            </li>
            <li th:class="${activePage == 'Calendar' ? 'active' : ''}">
                <a th:href="@{/calendar}">Calendar</a>
            </li>
            <li th:class="${activePage == 'Preparation Hub' ? 'active' : ''}">
                <a th:href="@{/preparation-hub}">Preparation Hub</a>
            </li>
            <li th:class="${activePage == 'Alumni Hub' ? 'active' : ''}">
                <a th:href="@{/alumni-hub}">Alumni Hub</a>
            </li>
            <li th:class="${activePage == 'Profile' ? 'active' : ''}">
                <a th:href="@{/profile}">Profile</a>
            </li>
        </th:block>

        <!-- ALUMNI -->
        <th:block th:if="${activePage == 'Alumni Dashboard'}">
            <li class="active">
                <a th:href="@{/alumni/dashboard}">Alumni Dashboard</a>
            </li>
        </th:block>

        <!-- HR -->
        <th:block th:if="${activePage == 'HR Dashboard' or activePage == 'HR Applicants'}">
            <li class="active">
                <a th:href="@{/hr/dashboard}">HR Dashboard</a>
            </li>
        </th:block>

        <!-- ADMIN -->
        <th:block th:if="${activePage == 'Admin Dashboard'}">
            <li class="active">
                <a th:href="@{/admin/dashboard}">Placement Statistics</a>
            </li>
        </th:block>

    </ul>

    <!-- USER SECTION -->
    <div class="user-section">
        <div class="user-profile">

            <!-- Avatar -->
            <div class="user-avatar"
                 th:text="${user != null && user.name != null ? #strings.substring(user.name,0,1) : 'U'}">
                U
            </div>

            <div class="user-info">

                <!-- NAME -->
                <h4 th:text="${user != null ? user.name : 'User'}">User Name</h4>

                <!-- ROLE -->
                <p th:text="${user != null ? user.role : 'User'}">Role</p>

            </div>
        </div>

        <!-- LOGOUT -->
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>

</div>

</body>
</html>
