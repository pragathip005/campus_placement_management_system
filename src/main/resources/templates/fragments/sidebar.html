<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="sidebar" class="sidebar">
    <div class="logo">CRMS.</div>

    <ul class="nav">
        <li><a th:href="@{/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/job-board}">Job Board</a></li>
        <li><a th:href="@{/preparation-hub}">Preparation Hub</a></li>
        <li><a th:href="@{/alumni}">Alumni Hub</a></li>
        <li><a th:href="@{/profile}">Profile</a></li>
    </ul>

    <div class="user">
        <div class="user-profile">
            <div class="user-avatar" th:text="${user != null ? #strings.substring(user.name, 0, 1) : 'U'}">N</div>
            <div class="user-info">
                <h4 th:text="${user != null ? user.name : 'User Name'}">User Name</h4>
                <p th:text="${user != null ? user.role : ''}">Guest</p>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</div>
</body>
</html>
