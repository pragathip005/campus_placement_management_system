<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>

<body>

<div class="card">

    <h2>Create Account</h2>
    <p class="subtitle">Join CRMS and get started</p>

    <form method="post" action="/register">

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <!-- ROLE SELECT -->
        <div class="role-btns">
            <button type="button" onclick="setRole('student')" id="studentBtn" class="active">Student</button>
            <button type="button" onclick="setRole('hr')" id="hrBtn">HR</button>
        </div>

        <input type="hidden" name="role" id="roleInput" value="student">

        <!-- COMMON -->
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>

        <!-- STUDENT -->
        <div id="studentFields">
            <input type="text" name="branch" placeholder="Branch">
            <input type="number" step="0.01" name="cgpa" placeholder="CGPA">
            <input type="number" name="backlogCount" placeholder="Backlogs">
        </div>

        <!-- HR -->
        <div id="hrFields" style="display:none;">
            <input type="text" name="companyName" placeholder="Company Name">
        </div>

        <button type="submit" class="submit-btn">Create Account</button>
    </form>

    <div class="footer">
        Already have an account?
        <a href="/login">Login</a>
    </div>

</div>

<script>
function setRole(role) {
    document.getElementById("roleInput").value = role;

    // highlight buttons
    document.getElementById("studentBtn").classList.remove("active");
    document.getElementById("hrBtn").classList.remove("active");

    document.getElementById(role + "Btn").classList.add("active");

    // toggle fields
    if (role === "student") {
        document.getElementById("studentFields").style.display = "block";
        document.getElementById("hrFields").style.display = "none";
    } else {
        document.getElementById("studentFields").style.display = "none";
        document.getElementById("hrFields").style.display = "block";
    }
}
</script>

</body>
</html>
