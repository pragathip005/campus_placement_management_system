<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: layout('HR Dashboard', ~{::content}, ~{::styles}, ~{::scripts})}">

<head>
    <th:block th:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/hr-dashboard.css}">
    </th:block>
    <th:block th:fragment="scripts">
        <script>
            function toggleModal(show) {
                document.getElementById('postJobModal').style.display = show ? 'flex' : 'none';
                if (show) {
                    handleJobTypeChange();
                }
            }

            function handleJobTypeChange() {
                const type = document.getElementById('jobTypeSelect').value;
                const ctcGroup = document.getElementById('ctcGroup');
                const stipendGroup = document.getElementById('stipendGroup');
                const durationGroup = document.getElementById('durationGroup');
                const ctcInput = document.getElementById('ctcInput');
                const stipendInput = document.getElementById('stipendInput');
                const durationInput = document.getElementById('durationInput');

                if (type === 'FTE') {
                    ctcGroup.style.display = 'flex';
                    ctcInput.required = true;
                    stipendGroup.style.display = 'none';
                    stipendInput.required = false;
                    durationGroup.style.display = 'none';
                    durationInput.required = false;
                } else if (type === 'INTERNSHIP') {
                    ctcGroup.style.display = 'none';
                    ctcInput.required = false;
                    stipendGroup.style.display = 'flex';
                    stipendInput.required = true;
                    durationGroup.style.display = 'flex';
                    durationInput.required = true;
                } else if (type === 'BOTH') {
                    ctcGroup.style.display = 'flex';
                    ctcInput.required = true;
                    stipendGroup.style.display = 'flex';
                    stipendInput.required = true;
                    durationGroup.style.display = 'flex';
                    durationInput.required = true;
                }
            }

            // Tabs logic removed as there is only active postings now
        </script>
    </th:block>
</head>

<body>

    <!-- DEFINE content fragment -->
    <th:block th:fragment="content">
        <div class="main-content hr-container">

            <div class="hr-header">
                <div>
                    <h1>HR Dashboard</h1>
                    <p>Manage your job postings and applicants.</p>
                </div>
                <button class="post-job-btn" onclick="toggleModal(true)">
                    + Post New Job
                </button>
            </div>

            <div id="activePostings">

                <div th:if="${successMessage}" style="color: green; margin-bottom: 15px; font-weight: bold;">
                    <p th:text="${successMessage}"></p>
                </div>
                <div th:if="${errorMessage}" style="color: red; margin-bottom: 15px; font-weight: bold;">
                    <p th:text="${errorMessage}"></p>
                </div>

                <div class="postings-list">
                    <a th:each="posting : ${activePostings}"
                        th:href="@{/hr/job/{id}/applicants(id=${posting.job.opportunity_id})}" class="posting-card">
                        <div class="posting-header">
                            <h3 th:text="${posting.job.name}">Role Name</h3>
                            <span th:class="'status-badge ' + (${posting.isOpen} ? 'open' : 'closed')"
                                th:text="${posting.isOpen} ? 'OPEN' : 'CLOSED'">OPEN</span>
                        </div>

                        <p style="color: #718096; font-size: 14px; margin-bottom: 16px;" th:text="${posting.job.role}">
                            Job Type</p>

                        <div class="posting-details">
                            <span>CTC: <span
                                    th:text="${posting.job.ctc != null ? posting.job.ctc + ' LPA' : 'N/A'}"></span></span>
                            <span>Min CGPA: <span th:text="${posting.job.minCgpa}"></span></span>
                            <span>Deadline: <span
                                    th:text="${posting.job.applicationDeadline != null ? #temporals.format(posting.job.applicationDeadline, 'd MMM yyyy') : 'N/A'}"></span></span>
                            <span>Openings: <span
                                    th:text="${posting.job.vacancies != null ? posting.job.vacancies : 'N/A'}"></span></span>
                        </div>

                        <div class="posting-footer">
                            <span>👥 <span th:text="${posting.applicantCount}"></span> Applicants</span>
                        </div>
                    </a>

                    <div th:if="${#lists.isEmpty(activePostings)}"
                        style="text-align: center; color: #718096; padding: 40px;">
                        <p>No active postings found. Click "Post New Job" to create one.</p>
                    </div>
                </div>
            </div>



            <!-- POST JOB MODAL -->
            <div id="postJobModal" class="job-modal">
                <div class="job-modal-content">
                    <h2 style="margin-bottom: 20px; font-size: 20px;">Post New Opportunity</h2>
                    <form th:action="@{/hr/job/post}" method="post" enctype="multipart/form-data">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Job Title</label>
                                <input type="text" name="name" required placeholder="e.g. Software Engineer Intern">
                            </div>
                            <div class="form-group">
                                <label>Role Type</label>
                                <input type="text" name="role" required placeholder="e.g. SDE-1">
                            </div>

                            <div class="form-group full-width">
                                <label>Description</label>
                                <textarea name="description" rows="4" required></textarea>
                            </div>

                            <div class="form-group">
                                <label>Job Category</label>
                                <select name="type" id="jobTypeSelect" required onchange="handleJobTypeChange()">
                                    <option value="FTE">Full Time (FTE)</option>
                                    <option value="INTERNSHIP">Internship</option>
                                    <option value="BOTH">FTE + Internship</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Location</label>
                                <input type="text" name="location" required>
                            </div>

                            <div class="form-group" id="ctcGroup">
                                <label>CTC (LPA)</label>
                                <input type="number" step="0.1" name="ctc" id="ctcInput" required>
                            </div>

                            <div class="form-group" id="stipendGroup" style="display: none;">
                                <label>Stipend</label>
                                <input type="number" step="0.1" name="stipend" id="stipendInput">
                            </div>

                            <div class="form-group" id="durationGroup" style="display: none;">
                                <label>Duration (Months)</label>
                                <input type="number" name="duration" id="durationInput">
                            </div>

                            <div class="form-group">
                                <label>Minimum CGPA</label>
                                <input type="number" step="0.1" name="minCgpa" required>
                            </div>

                            <div class="form-group">
                                <label>Openings</label>
                                <input type="number" name="vacancies" required>
                            </div>

                            <div class="form-group">
                                <label>Eligible Branches</label>
                                <input type="text" name="eligibleBranches" placeholder="e.g. CSE, ECE, ISE">
                            </div>

                            <div class="form-group">
                                <label>Shortlisting Success (%)</label>
                                <input type="number" step="0.1" name="shortlistingSuccessRate">
                            </div>

                            <div class="form-group">
                                <label>Application Deadline</label>
                                <input type="datetime-local" name="applicationDeadline" required>
                            </div>

                            <div class="form-group">
                                <label>OA Date (Optional)</label>
                                <input type="datetime-local" name="oaDate">
                            </div>

                            <div class="form-group">
                                <label>Interview Date (Optional)</label>
                                <input type="datetime-local" name="interviewDate">
                            </div>
                            <div class="form-group">
                                <label>Job Description PDF (Optional)</label>
                                <input type="file" name="jdPdf" accept="application/pdf">
                            </div>

                        </div>

                        <div class="modal-actions">
                            <button type="button" class="btn-cancel" onclick="toggleModal(false)">Cancel</button>
                            <button type="submit" class="btn-submit">Post Job</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </th:block>
</body>

</html>
