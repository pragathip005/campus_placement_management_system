<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alumni Dashboard</title>
    <link rel="stylesheet" href="alumni-dashboard.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>CRMS</h2>
        <ul>
            <li class="active">Dashboard</li>
            <li>Profile</li>
            <li>Post Job</li>
            <li>Students</li>
            <li>Logout</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">
        <header>
            <h1>Welcome, Alumni</h1>
        </header>

        <div class="cards">
            <div class="card">
                <h3>Jobs Posted</h3>
                <p>12</p>
            </div>

            <div class="card">
                <h3>Applications Received</h3>
                <p>48</p>
            </div>

            <div class="card">
                <h3>Students Hired</h3>
                <p>5</p>
            </div>
        </div>

        <div class="recent">
            <h2>Recent Job Posts</h2>
            <table>
                <tr>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>Google</td>
                    <td>Software Engineer</td>
                    <td>Open</td>
                </tr>
                <tr>
                    <td>Amazon</td>
                    <td>Backend Developer</td>
                    <td>Closed</td>
                </tr>
            </table>
        </div>
    </div>

</body>
</html>
