<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left-panel">
        <div class="overlay">
            <h1>Launch your career<br>with the best companies.</h1>
            <p>
                The Campus Recruitment Management System connects top talent
                with industry-leading organizations seamlessly.
            </p>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">
        <div class="login-box">
            <h2>Welcome back</h2>
            <p>Please enter your details to sign in.</p>

            <!-- ROLE SELECT -->
            <div class="role-tabs">
                <button class="active">Student</button>
                <button>Company HR</button>
                <button>Admin</button>
            </div>

            <!-- FORM -->
            <form th:action="@{/login}" method="post">

                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email">

                <label>Password</label>
                <input type="password" name="password" placeholder="********">

                <div class="options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">Sign in →</button>

            </form>

            <p class="signup">
                Don't have an account?
                <a href="#">Create an account</a>
            </p>

        </div>
    </div>

</div>

</body>
</html>
