<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <div class="overlay"></div>
        <div class="content">
            <h1>Launch your career <br>with the best companies.</h1>
            <p>The Campus Recruitment Management System connects top talent with industry-leading organizations seamlessly.</p>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="form-box">

            <h2>Welcome back</h2>
            <p>Please enter your details</p>

            <form method="post" action="/login">
                <input type="hidden" name="csrfToken" th:value="${csrfToken}">
                <!-- ROLE SELECT -->
                <div class="role-container">
                    <input type="radio" id="student" name="role" value="student" checked>
                    <label for="student">Student</label>

                    <input type="radio" id="hr" name="role" value="hr">
                    <label for="hr">HR</label>

                    <input type="radio" id="admin" name="role" value="admin">
                    <label for="admin">Admin</label>
                </div>

                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Sign In</button>
            </form>

            <p>Don't have account? <a href="/register">Register</a></p>

        </div>
    </div>

</div>

</body>
</html>
