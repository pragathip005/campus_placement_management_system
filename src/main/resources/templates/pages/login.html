<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            background: #f9fafb;
        }

        /* LEFT SIDE */
        .left {
            width: 50%;
            position: relative;
            background: linear-gradient(to bottom right, #fb923c, #ea580c);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px;
        }

        .left h1 {
            font-size: 42px;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .left p {
            font-size: 16px;
            opacity: 0.9;
        }

        /* RIGHT SIDE */
        .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            width: 380px;
        }

        h2 {
            margin-bottom: 5px;
        }

        .subtitle {
            color: gray;
            margin-bottom: 25px;
        }

        /* ROLE SELECT */
        .role-select {
            display: flex;
            background: #f3f4f6;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .role-select button {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
        }

        .role-select button.active {
            background: white;
            color: #ea580c;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        input:focus {
            outline: none;
            border-color: #ea580c;
            box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.2);
        }

        button.submit-btn {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            color: white;
            cursor: pointer;

            /* 🔥 ORANGE GRADIENT LIKE YOUR TSX */
            background: linear-gradient(to right, #f97316, #ea580c);
        }

        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        a {
            color: #ea580c;
            text-decoration: none;
            font-weight: bold;
        }

    </style>
</head>

<body>

<!-- LEFT -->
<div class="left">
    <h1>Launch your career <br>with the best companies.</h1>
    <p>Campus Recruitment Management System connects top talent with companies.</p>
</div>

<!-- RIGHT -->
<div class="right">
    <div class="form-box">

        <h2>Welcome back</h2>
        <p class="subtitle">Please enter your details to sign in.</p>

        <!-- ERROR -->
        <div th:if="${error}" class="error" th:text="${error}"></div>

        <!-- ROLE SELECT -->
        <div class="role-select">
            <button type="button" class="role-btn active" onclick="setRole(this,'STUDENT')">Student</button>
            <button type="button" class="role-btn" onclick="setRole(this,'ALUMNI')">Alumni</button>
            <button type="button" class="role-btn" onclick="setRole(this,'HR')">HR</button>
            <button type="button" class="role-btn" onclick="setRole(this,'ADMIN')">Admin</button>
        </div>

        <!-- FORM -->
        <form method="post" action="/login">

            <!-- 🔥 IMPORTANT -->
            <input type="hidden" name="role" id="role" value="STUDENT">

            <label>Email</label>
            <input type="email" name="email" required placeholder="Enter your email">

            <label>Password</label>
            <input type="password" name="password" required placeholder="••••••••">

            <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <p style="margin-top:20px; text-align:center;">
            Don't have an account?
            <a href="/register">Create account</a>
        </p>

    </div>
</div>

<!-- ✅ WORKING SCRIPT -->
<script>
    function setRole(btn, role) {

        // set hidden input
        document.getElementById("role").value = role;

        // remove active from all
        document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));

        // add active to clicked
        btn.classList.add("active");

        console.log("Selected role:", role);
    }
</script>

</body>
</html>
