<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>CRMS</h2>
        <ul>
            <li class="active">Dashboard</li>
            <li>Manage Students</li>
            <li>Manage Alumni</li>
            <li>Manage Companies</li>
            <li>Reports</li>
            <li>Logout</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">
        <header>
            <h1>Welcome, Admin</h1>
        </header>

        <div class="cards">
            <div class="card">
                <h3>Total Students</h3>
                <p>320</p>
            </div>

            <div class="card">
                <h3>Total Alumni</h3>
                <p>150</p>
            </div>

            <div class="card">
                <h3>Companies Registered</h3>
                <p>45</p>
            </div>

            <div class="card">
                <h3>Placements</h3>
                <p>210</p>
            </div>
        </div>

        <div class="recent">
            <h2>Recent Registrations</h2>
            <table>
                <tr>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>Rahul Sharma</td>
                    <td>Student</td>
                    <td>Approved</td>
                </tr>
                <tr>
                    <td>Anita Verma</td>
                    <td>Alumni</td>
                    <td>Pending</td>
                </tr>
            </table>
        </div>
    </div>

</body>
</html>
